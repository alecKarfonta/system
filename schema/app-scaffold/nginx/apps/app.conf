# __APP_NAME__ — include from mlapi.us server block

location /__APP_NAME__/ {
    proxy_pass http://host196___APP_NAME___api;
    include /etc/nginx/snippets/proxy-backend.conf;
    include /etc/nginx/snippets/proxy-timeout.conf;
}

location = /__APP_NAME__ {
    return 301 /__APP_NAME__/;
}

location /__APP_NAME__/health {
    proxy_pass http://host196___APP_NAME___api/health;
    include /etc/nginx/snippets/proxy-backend.conf;
}
