apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: homelab/cpu-tier
                    operator: In
                    values:
                      - __CPU_TIER__
      containers:
        - name: app
          imagePullPolicy: IfNotPresent
