apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app: __APP_NAME__
    app.kubernetes.io/name: __APP_NAME__
    app.kubernetes.io/part-of: __APP_NAME__
    app.kubernetes.io/managed-by: system-deploy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: __APP_NAME__
  template:
    metadata:
      labels:
        app: __APP_NAME__
        app.kubernetes.io/name: __APP_NAME__
        app.kubernetes.io/part-of: __APP_NAME__
        app.kubernetes.io/managed-by: system-deploy
    spec:
      containers:
        - name: app
          image: ghcr.io/__GHCR_ORG__/__APP_NAME__:latest
          imagePullPolicy: Always
          ports:
            - containerPort: __APP_PORT__
              name: http
          envFrom:
            - configMapRef:
                name: __APP_NAME__-config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
