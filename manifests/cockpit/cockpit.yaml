# Fleet Cockpit — the homelab's GPU-centric management GUI.
# The app code lives in cockpit/{app.py,index.html}; scripts/cockpit.sh packs them
# into the ConfigMap referenced below, then applies this file.
apiVersion: v1
kind: Namespace
metadata:
  name: cockpit
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cockpit
  namespace: cockpit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cockpit
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["patch"]               # cordon/uncordon + gpu.homelab/* labels
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]              # the DRAIN button (PDB-respecting evictions)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["patch", "update"]     # the scale +/- buttons
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cockpit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cockpit
subjects:
  - kind: ServiceAccount
    name: cockpit
    namespace: cockpit
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cockpit
  namespace: cockpit
  labels: { app: cockpit }
spec:
  replicas: 1
  selector:
    matchLabels: { app: cockpit }
  template:
    metadata:
      labels: { app: cockpit }
    spec:
      serviceAccountName: cockpit
      containers:
        - name: cockpit
          image: python:3.12-slim
          command: ["python", "/app/app.py"]
          env:
            - name: PORT
              value: "8090"
          ports:
            - containerPort: 8090
          volumeMounts:
            - name: code
              mountPath: /app
          readinessProbe:
            httpGet: { path: /healthz, port: 8090 }
            initialDelaySeconds: 2
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }
      volumes:
        - name: code
          configMap:
            name: cockpit-code
---
apiVersion: v1
kind: Service
metadata:
  name: cockpit
  namespace: cockpit
spec:
  type: NodePort
  selector: { app: cockpit }
  ports:
    - port: 80
      targetPort: 8090
      nodePort: 30880          # stable LAN URL: http://<any-node-ip>:30880
