# Fleet Command — the homelab's GPU-centric management GUI.
# The app code lives in cockpit/{app.py,index.html}; scripts/cockpit.sh packs them
# into the ConfigMap referenced below, then applies this file.
apiVersion: v1
kind: Namespace
metadata:
  name: cockpit
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cockpit
  namespace: cockpit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cockpit
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["patch", "delete"]     # cordon/labels + rename (remove old node)
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]              # the DRAIN button (PDB-respecting evictions)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]   # scale + scheduling/resources UI
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["patch", "update"]     # the scale +/- buttons
  - apiGroups: ["longhorn.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]         # per-node Longhorn disk usage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cockpit-join
  namespace: cockpit
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["cockpit-join"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cockpit-join
  namespace: cockpit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cockpit-join
subjects:
  - kind: ServiceAccount
    name: cockpit
    namespace: cockpit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cockpit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cockpit
subjects:
  - kind: ServiceAccount
    name: cockpit
    namespace: cockpit
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cockpit
  namespace: cockpit
  labels: { app: cockpit }
spec:
  replicas: 1
  selector:
    matchLabels: { app: cockpit }
  template:
    metadata:
      labels: { app: cockpit }
    spec:
      serviceAccountName: cockpit
      # Stay on the control-plane — renaming a worker must not kill the UI mid-job.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: homelab/cpu-tier
                    operator: In
                    values: [cheap]
      containers:
        - name: cockpit
          image: python:3.12-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq openssh-client sshpass >/dev/null 2>&1 || true
              exec python /app/app.py
          env:
            - name: PORT
              value: "8090"
          ports:
            - containerPort: 8090
          volumeMounts:
            - name: code
              mountPath: /app
            - name: join
              mountPath: /var/run/secrets/join
              readOnly: true
            - name: ssh
              mountPath: /var/run/secrets/ssh
              readOnly: true
          startupProbe:
            httpGet: { path: /healthz, port: 8090 }
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet: { path: /healthz, port: 8090 }
            periodSeconds: 5
          resources:
            requests: { cpu: 25m, memory: 128Mi }
            limits:   { cpu: 200m, memory: 256Mi }
      volumes:
        - name: code
          configMap:
            name: cockpit-code
        - name: join
          secret:
            secretName: cockpit-join
            optional: true
        - name: ssh
          secret:
            secretName: cockpit-ssh
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: cockpit
  namespace: cockpit
spec:
  type: NodePort
  selector: { app: cockpit }
  ports:
    - port: 80
      targetPort: 8090
      nodePort: 30880          # stable LAN URL: http://<any-node-ip>:30880
