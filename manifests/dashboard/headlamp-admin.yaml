# An admin login for Headlamp. Creates a ServiceAccount with cluster-admin and a
# long-lived token Secret you paste into the Headlamp login screen.
#
# SECURITY NOTE: cluster-admin = full control of the cluster. Fine for a private
# homelab. If you ever expose Headlamp beyond your LAN/tailnet, scope this down
# to a read-mostly ClusterRole and put an auth proxy in front.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp-admin
    namespace: kube-system
---
apiVersion: v1
kind: Secret
metadata:
  name: headlamp-admin-token
  namespace: kube-system
  annotations:
    kubernetes.io/service-account.name: headlamp-admin
type: kubernetes.io/service-account-token
