# Homelab container registry (Docker Distribution v2, TLS on port 5000).
# Push/pull: https://<SERVER_HOST>:<REGISTRY_NODEPORT>  (see make registry / config/cluster.env)
# In-cluster: registry.registry.svc.cluster.local:5000
apiVersion: v1
kind: Namespace
metadata:
  name: registry
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: registry
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 200Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-auth
  namespace: registry
type: Opaque
stringData:
  # Replaced by scripts/registry.sh on install (htpasswd format).
  htpasswd: "homelab:REPLACE_ON_INSTALL"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
  labels: { app: registry }
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: registry }
  template:
    metadata:
      labels: { app: registry }
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: homelab/cpu-tier
                    operator: In
                    values: [cheap]
            - weight: 50
              preference:
                matchExpressions:
                  - key: homelab/cpu-tier
                    operator: In
                    values: [standard]
      containers:
        - name: registry
          image: registry:2.8
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
            - name: REGISTRY_AUTH
              value: htpasswd
            - name: REGISTRY_AUTH_HTPASSWD_REALM
              value: homelab
            - name: REGISTRY_AUTH_HTPASSWD_PATH
              value: /auth/htpasswd
            - name: REGISTRY_HTTP_TLS_CERTIFICATE
              value: /certs/tls.crt
            - name: REGISTRY_HTTP_TLS_KEY
              value: /certs/tls.key
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
            - name: auth
              mountPath: /auth
              readOnly: true
            - name: tls
              mountPath: /certs
              readOnly: true
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: "2", memory: 1Gi }
          readinessProbe:
            httpGet: { path: /, port: 5000, scheme: HTTPS }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 5000, scheme: HTTPS }
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
        - name: auth
          secret:
            secretName: registry-auth
        - name: tls
          secret:
            secretName: registry-tls
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: registry
spec:
  type: NodePort
  selector: { app: registry }
  ports:
    - name: https
      port: 5000
      targetPort: 5000
      nodePort: 30500
