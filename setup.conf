# System Setup Configuration
# Override these values to customize installation. Values are read by setup.sh
# and module scripts. Export or source this file before running setup.

# === Core System ===
SWAP_SIZE=64G
SWAP_FILE=/swapfile
SWAP_SWAPPINESS=10

# Base packages (space-separated)
CORE_PACKAGES="build-essential curl wget git software-properties-common ca-certificates gnupg2 apt-transport-https lsb-release openssh-server mlocate"

# === Docker ===
DOCKER_COMPOSE_VERSION=2
DOCKER_LOG_MAX_SIZE=10m
DOCKER_LOG_MAX_FILE=3
DOCKER_STORAGE_DRIVER=overlay2

# === NVIDIA / GPU ===
# Driver version: 535 or 550 (empty = auto-detect based on Ubuntu)
GPU_DRIVER_VERSION=
# CUDA version: 11.8, 12.0, 12.1, 12.3, 12.8 (empty = auto based on Ubuntu)
CUDA_VERSION=
# Ubuntu version mapping (22.04 -> 12.3, 24.04 -> 12.8)
CUDA_UBUNTU_2204=12.3
CUDA_UBUNTU_2404=12.8

# === Python / Conda ===
CONDA_INSTALL_DIR=$HOME/miniconda3
CONDA_BASE_ENV=base
REQUIREMENTS_FILE=requirements.txt

# === Cluster / MicroK8s ===
MICROK8S_CHANNEL=1.26/stable
MICROK8S_ADDONS="dns hostpath-storage ingress metallb rbac"
# MetalLB IP range for LoadBalancer services
METALLB_IP_RANGE=10.64.140.43-10.64.140.49
# Pod network CIDR
CLUSTER_POD_CIDR=172.16.0.0/16

# === Services (docker-compose) ===
COMPOSE_FILE=docker-compose.yml
ENV_EXAMPLE=.envs.example
ENV_FILE=.envs

# === Paths ===
# SCRIPT_ROOT is set by setup.sh (do not override)
LOG_FILE=/var/log/system-setup.log
