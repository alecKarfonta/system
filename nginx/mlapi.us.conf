# mlapi.us — primary multi-app edge server.
# Source of truth: system/nginx/mlapi.us.conf
# Installed to: /etc/nginx/sites-available/mlapi.us (symlinked from sites-enabled/)
# Public access: Cloudflare Tunnel -> https://localhost:8443
# LAN access:    https://192.168.1.4:8443 or https://mlapi.us (if DNS points here)
#
# Apps are routed by including every file in /etc/nginx/conf.d/apps/*.conf.
# To add an app's edge routes: install its conf via `install-nginx-app.sh <app>`
# (or `make app-deploy APP=<app>`, which runs that step automatically).
# No hand-editing of this file is needed for new apps.

server {
    # Port 443 on node-4 is DNAT'd to k3s (traefik hostport) — use 8443 or Cloudflare Tunnel.
    listen 8443 ssl http2 default_server;
    listen [::]:8443 ssl http2 default_server;
    server_name mlapi.us www.mlapi.us *.mlapi.us 192.168.1.4 node-4;
    client_max_body_size 2048M;
    port_in_redirect off;

    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/security-headers.conf;

    # Every app's location blocks. Each install-nginx-app.sh run drops a file
    # into /etc/nginx/conf.d/apps/<name>.conf, which this glob picks up.
    include /etc/nginx/conf.d/apps/*.conf;

    location / {
        proxy_pass http://host77_cardcam/;
        include /etc/nginx/snippets/proxy-backend.conf;
        include /etc/nginx/snippets/cross-origin-isolation.conf;
    }

    location ~ /\. {
        deny all;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 9980;
    listen [::]:9980;
    server_name mlapi.us www.mlapi.us *.mlapi.us 192.168.1.4 node-4;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
