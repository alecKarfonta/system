# CARDCAM — trading card scanner (vanilla-JS frontend, ONNX inference in browser)
# Requires cross-origin isolation for ONNX threaded WASM.

location = /cardcam {
    return 301 /cardcam/;
}

location /cardcam/health {
    proxy_pass http://host77_cardcam/health;
    include /etc/nginx/snippets/proxy-backend.conf;
}

location ^~ /cardcam/ {
    proxy_pass http://host77_cardcam/;
    include /etc/nginx/snippets/proxy-backend.conf;
    include /etc/nginx/snippets/cross-origin-isolation.conf;
}
