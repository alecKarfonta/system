# GLORP BUSTERS (musical_defense) — static game at /glorp/

location = /glorp {
    return 301 /glorp/;
}

location /glorp/health {
    proxy_pass http://host196_glorp_api/health;
    include /etc/nginx/snippets/proxy-backend.conf;
}

location = /glorp/ {
    return 302 /glorp/glorp-busters.html;
}

location /glorp/ {
    proxy_pass http://host196_glorp_api/;
    include /etc/nginx/snippets/proxy-backend.conf;
    include /etc/nginx/snippets/proxy-timeout.conf;
}
