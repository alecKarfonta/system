# ARCADE — Stockastic game catalog at /arcade/

location = /arcade {
    return 301 /arcade/;
}

location /arcade/health {
    proxy_pass http://host196_arcade_api/health;
    include /etc/nginx/snippets/proxy-backend.conf;
}

location /arcade/ {
    proxy_pass http://host196_arcade_api/;
    include /etc/nginx/snippets/proxy-backend.conf;
    include /etc/nginx/snippets/proxy-timeout.conf;
}
