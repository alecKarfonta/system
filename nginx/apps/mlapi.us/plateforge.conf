# PLATEFORGE — include from mlapi.us server block
# Unified app serves UI at /plateforge/ and API at /upload, /sessions/, etc.
# proxy_pass must NOT have a trailing slash or nginx strips the /plateforge prefix.

location /stl/api/ {
    proxy_pass http://host196_plateforge_api/;
    include /etc/nginx/snippets/proxy-backend.conf;
    include /etc/nginx/snippets/proxy-timeout.conf;
}

location /plateforge/ {
    proxy_pass http://host196_plateforge_api;
    include /etc/nginx/snippets/proxy-backend.conf;
    include /etc/nginx/snippets/proxy-timeout.conf;
}

location = /plateforge {
    return 301 /plateforge/;
}

location /stl-api/ {
    proxy_pass http://host196_plateforge_api/;
    include /etc/nginx/snippets/proxy-backend.conf;
    include /etc/nginx/snippets/proxy-timeout.conf;
}
