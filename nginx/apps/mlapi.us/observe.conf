# OPENOBSERVE — include from mlapi.us server block
# ZO_BASE_URI=/observe on the router pod. proxy_pass must NOT have a trailing slash.

location = /observe {
    return 301 /observe/;
}

location /observe/ {
    proxy_pass http://host196_observe_api;
    include /etc/nginx/snippets/proxy-backend.conf;
    include /etc/nginx/snippets/proxy-timeout.conf;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
