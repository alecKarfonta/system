# NOGGIN — static game at /noggin/

location = /noggin {
    return 301 /noggin/;
}

location = /noggin/ {
    return 302 /noggin/synapse.html;
}

location /noggin/health {
    proxy_pass http://host196_noggin_api/health;
    include /etc/nginx/snippets/proxy-backend.conf;
}

location /noggin/ {
    proxy_pass http://host196_noggin_api/;
    include /etc/nginx/snippets/proxy-backend.conf;
    include /etc/nginx/snippets/proxy-timeout.conf;
}
