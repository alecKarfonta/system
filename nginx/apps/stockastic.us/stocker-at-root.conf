# ========================================================================
# STOCKER at site root — for stockastic.us (API /api/, static /static/, SPA /)
# Static: /var/www/stockastic (scripts/sync-stockastic-static.sh)
# ========================================================================

location /api/ {
    proxy_pass http://stocker_api/api/;
    include /etc/nginx/snippets/proxy-backend.conf;
    include /etc/nginx/snippets/proxy-timeout.conf;
}

location /ws/ {
    proxy_pass http://stocker_api/ws/;
    include /etc/nginx/snippets/proxy-params.conf;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_connect_timeout 300;
    proxy_buffering off;
    proxy_cache off;
}

location /sse/ {
    proxy_pass http://stocker_api/sse/;
    include /etc/nginx/snippets/proxy-params.conf;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
}

location ^~ /static/ {
    alias /var/www/stockastic/static/;
    include /etc/nginx/snippets/stocker-static.conf;
}

location / {
    root /var/www/stockastic;
    try_files $uri $uri/ /index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_static on;

    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://accounts.google.com https://www.gstatic.com https://js.stripe.com; worker-src 'self' blob:; child-src 'self' blob: https://js.stripe.com; frame-src 'self' https://accounts.google.com https://*.firebaseapp.com https://js.stripe.com https://hooks.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' wss: ws: https:; media-src 'self' blob:;" always;
}
