# BONE BOMBERS — static game at /bone/

location = /bone {
    return 301 /bone/;
}

location = /bone/ {
    return 302 /bone/bone_bombers.html;
}

location /bone/ {
    proxy_pass http://host196_bone_bombers_api/;
    include /etc/nginx/snippets/proxy-backend.conf;
    include /etc/nginx/snippets/proxy-timeout.conf;
}
