# SSL for stockastic.us (dedicated Stocker domain)
# Box dependency: certbot-provisioned at standard paths.
# Provision with: sudo certbot certonly --nginx -d stockastic.us -d www.stockastic.us

ssl_certificate /etc/letsencrypt/live/stockastic.us/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/stockastic.us/privkey.pem;
include /etc/letsencrypt/options-ssl-nginx.conf;
ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
