# Static asset delivery for /stocker/ (host nginx, no container hop)
gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;
gzip_static on;

expires 1y;
add_header Cache-Control "public, immutable" always;
