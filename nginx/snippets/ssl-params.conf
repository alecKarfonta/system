# SSL Configuration for mlapi.us
# Include this in your server block with: include /etc/nginx/snippets/ssl-params.conf;
#
# Box dependency: certificates are issued by certbot to the standard paths below.
# Provision with: sudo certbot certonly --nginx -d mlapi.us -d www.mlapi.us

ssl_certificate /etc/letsencrypt/live/mlapi.us/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/mlapi.us/privkey.pem;
include /etc/letsencrypt/options-ssl-nginx.conf;
ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
