upstream host196_plateforge_api {
    # k3s ServiceLB binds 127.0.0.1:8116 (and LAN IPs) fronting the plateforge pod.
    # Do not run a docker container named "plateforge" on port 8116 — it shadows
    # the k8s ServiceLB and serves stale builds. Deploy via `make app-deploy`.
    server 127.0.0.1:8116;
    keepalive 8;
}

upstream host196_plateforge_fe {
    server 127.0.0.1:8116;
    keepalive 8;
}
