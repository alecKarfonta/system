# ========================================================================
# stockastic.us — Stocker only (root URLs, no /stocker/ prefix)
# Source of truth: system/nginx/stockastic.us.conf
# Installed to:  /etc/nginx/sites-available/stockastic.us
# Router/DNS:    point stockastic.us public :443 -> 192.168.1.4:8443
# SSL:           certbot provisioned (snippets/ssl-stockastic.us.conf)
# Static:        sudo ~/stocker/scripts/sync-stockastic-static.sh
#
# Apps are routed by including every file in
# /etc/nginx/conf.d/apps/stockastic.us/*.conf — install an app's conf via
# `install-nginx-app.sh <app>` to add it.
# ========================================================================

server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name stockastic.us www.stockastic.us;
    client_max_body_size 512M;

    include /etc/nginx/snippets/ssl-stockastic.us.conf;
    include /etc/nginx/snippets/security-headers.conf;

    include /etc/nginx/conf.d/apps/stockastic.us/*.conf;

    location ~ /\. {
        deny all;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name stockastic.us www.stockastic.us;

    location / {
        return 301 https://$host$request_uri;
    }
}
